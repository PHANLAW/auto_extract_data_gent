name: web_image_detection
description: Detect if image is a web browser screenshot with address bar
version: 1.0.0

prompt: |
  Bạn là hệ thống phân loại ảnh chụp màn hình trình duyệt web.

  NHIỆM VỤ: Xác định xem ảnh này có phải là ảnh chụp màn hình trình duyệt web (web browser) có thanh địa chỉ (address bar) hay không.

  TIÊU CHÍ ĐỂ NHẬN DIỆN ẢNH WEB (ưu tiên các dấu hiệu này):
  1. Có thanh địa chỉ (address bar) ở trên cùng của trình duyệt - ĐÂY LÀ DẤU HIỆU QUAN TRỌNG NHẤT
  2. Thanh địa chỉ thường có:
     - URL hiển thị (có thể có http:// hoặc https://)
     - Các icon như: lock icon (🔒), refresh button (↻), back/forward buttons
     - Màu sắc đặc trưng của trình duyệt (xám, trắng, hoặc màu của Chrome/Firefox/Edge)
  3. Có thể có tab bar (thanh tab) ở trên cùng với các tab
  4. Giao diện giống trình duyệt web (Chrome, Firefox, Edge, Safari, Opera, etc.)
  5. Có thể có bookmark bar, menu bar, hoặc các thanh công cụ của trình duyệt

  LƯU Ý QUAN TRỌNG:
  - Ngay cả khi ảnh chỉ chụp một phần của trình duyệt, nếu có thanh địa chỉ (address bar) thì vẫn là ảnh web
  - Ảnh có thể chụp từ mobile browser hoặc desktop browser - cả hai đều là ảnh web
  - Ảnh có thể chụp ở chế độ fullscreen nhưng vẫn có thanh địa chỉ ở trên cùng

  KHÔNG PHẢI ẢNH WEB CHỈ KHI:
  - Là ảnh chụp màn hình ứng dụng mobile (app) KHÔNG có trình duyệt web
  - Là ảnh chụp màn hình desktop nhưng KHÔNG có trình duyệt web (ví dụ: chỉ có desktop, không có browser)
  - Là ảnh có URL trong ghi chú/note/text nhưng KHÔNG có thanh địa chỉ trình duyệt
  - Là ảnh chụp màn hình ứng dụng khác hoàn toàn (không phải trình duyệt)

  ĐỊNH DẠNG TRẢ LỜI:
  - Nếu là ảnh web có thanh address bar: trả về duy nhất "YES"
  - Nếu KHÔNG phải ảnh web: trả về duy nhất "NO"

  Không giải thích, không thêm text nào khác.

model_config:
  max_tokens: 10
  temperature: 0.0
